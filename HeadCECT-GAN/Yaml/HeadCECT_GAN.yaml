#####
name: HeadCECT-GAN
bidirect: False #Unidirectional or bidirectional
regist: True    # With or without registration network
noise_level: 1  #  noise level
port: 6019   #  port parameters
save_root: './output/HeadCECT-GAN/'
image_save: './output/HeadCECT-GAN/img/'

# lamda weight
Adv_lamda: 1
Cyc_lamda: 10
Corr_lamda: 20
Smooth_lamda: 10
TV_lamda: 1


epoch: 0        # starting epoch
n_epochs: 80       # How often do you want to display output images during training
batchSize: 1               # size of the batches
dataroot: '/data1/dataset1/train/'     # root directory of the dataset
val_dataroot: '/data1/dataset1/val/'
test_dataroot: '/data1/dataset1/test/'
lr: 0.0001                   # initial learning rate
decay_epoch: 20            # epoch to start linearly decaying the learning rate to 0
size: 512                # size of the data crop
input_nc: 1         
output_nc: 1
cuda: True                
n_cpu: 1
